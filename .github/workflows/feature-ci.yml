# .github/workflows/feature-ci.yml
#
# Runs on PRs and pushes to feature engineering repos.
# CI ONLY generates a manifest -- it NEVER calls horizon.

name: Feature Computation CI

on:
  pull_request:
    paths:
      - 'notebooks/**'
      - 'py-sdk/feature_compute_engine/**'

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -e py-sdk/feature_compute_engine/
          pip install pyspark --no-deps

      - name: Generate manifest
        run: |
          bharatml manifest \
            --notebook-dir notebooks/ \
            --output-dir . \
            --git-sha ${{ github.event.pull_request.head.sha }}

      - name: Compute local diff (no horizon needed)
        id: diff
        run: |
          git show origin/${{ github.base_ref }}:.bharatml/manifest.json > /tmp/base_manifest.json 2>/dev/null || echo '{"assets":[]}' > /tmp/base_manifest.json

          bharatml diff \
            --base /tmp/base_manifest.json \
            --proposed .bharatml/manifest.json \
            --format markdown > /tmp/diff_output.md

          echo "diff_output<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/diff_output.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit manifest to PR branch
        run: |
          git config user.name "bharatml-bot"
          git config user.email "bharatml-bot@users.noreply.github.com"
          git add .bharatml/manifest.json
          git diff --cached --quiet || git commit -m "chore: update bharatml manifest [skip ci]"
          git push

      - name: Post summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff_output }}`;

            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('.bharatml/manifest.json', 'utf8'));
            const summary = manifest.summary;

            const body = [
              '## bharatml manifest',
              '',
              `**Assets:** ${summary.total_assets} total (${summary.serving_count} serving)`,
              `**Entities:** ${Object.entries(summary.by_entity).map(([k,v]) => `${k}(${v})`).join(', ')}`,
              `**Triggers:** ${Object.entries(summary.by_trigger).map(([k,v]) => `${k}(${v})`).join(', ')}`,
              '',
              '### Changes vs main',
              '',
              diff || 'No changes detected.',
              '',
              '---',
              '_Full impact analysis available in Trufflebox after review._',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.data.find(c => c.body.includes('bharatml manifest'));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id, owner: context.repo.owner,
                repo: context.repo.repo, body: body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner, repo: context.repo.repo, body: body,
              });
            }
